name: Compile LaTeX

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-latex:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Compiling LaTeX documents
        uses: xu-cheng/latex-action@v4
        with:
          texlive_version: 2023
          root_file: main.tex
          working_directory: src
          args: -pdf -outdir=../.build -halt-on-error -synctex=1 -interaction=nonstopmode --shell-escape --enable-write18
          extra_system_packages: 'inkscape openjdk17 py3-pygments font-dejavu'

      - name: Upload LaTeX PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: thesis-pdf
          path: .build/main.pdf
          if-no-files-found: error

  publish-release:
    needs: build-latex
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: thesis-pdf
          path: src

      - name: Publish PDF to GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Thesis PDF
          body: Automatically updated thesis PDF from `${{ github.ref_name }}`.
          allowUpdates: true
          removeArtifacts: true
          artifacts: src/main.pdf

  publish-revision-release:
    needs: build-latex
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/revision-')
    steps:
      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: thesis-pdf
          path: src

      - name: Publish PDF to revision release
        uses: ncipollo/release-action@v1
        with:
          tag: revision-latest
          name: Latest Revision Thesis PDF
          body: Automatically updated thesis PDF from `${{ github.ref_name }}`.
          allowUpdates: true
          removeArtifacts: true
          artifacts: src/main.pdf
          prerelease: true
          makeLatest: false

  publish-pages:
    needs: build-latex
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download PDF artifact
        uses: actions/download-artifact@v4
        with:
          name: thesis-pdf
          path: src

      - name: Build GitHub Pages site
        run: |
          bash .github/scripts/build-pages-site.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4