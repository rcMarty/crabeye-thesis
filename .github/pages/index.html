<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>RANAL Thesis</title>
    <style>
        body {
            max-width: 960px;
            margin: 2rem auto;
            padding: 0 1rem 3rem;
            font-family: system-ui, sans-serif;
            line-height: 1.6;
        }

        nav {
            margin-bottom: 1.5rem;
        }

        nav a {
            margin-right: 1rem;
        }

        #readme {
            border-top: 1px solid #ddd;
            padding-top: 1rem;
        }

        #stats {
            border-top: 1px solid #ddd;
            padding-top: 1rem;
            margin-top: 1.5rem;
        }

        .pdf-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #ddd;
        }

        .pdf-toolbar {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 0.75rem;
        }

        .pdf-toolbar a {
            padding: 0.65rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid #bbb;
            background: #f5f5f5;
            color: #111;
            text-decoration: none;
            cursor: pointer;
            font: inherit;
        }

        .pdf-wrapper {
            width: 100%;
            height: min(60vh, 720px);
            border: 1px solid #ccc;
            border-radius: 0.75rem;
            overflow: hidden;
            background: #666;
        }

        .pdf-wrapper iframe {
            width: 100%;
            height: 100%;
            border: 0;
            background: #666;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <h1>RANAL - diploma thesis</h1>

    <section id="readme">Loading README...</section>
    <section id="stats">Loading statistics...</section>

    <section class="pdf-section">
        <h2>PDF preview of the thesis</h2>
        <div class="pdf-toolbar">
            <a href="pdf/">Open full preview of the thesis</a>
            <a href="main.pdf" target="_blank" rel="noopener noreferrer">Download or open PDF</a>
        </div>
        <div class="pdf-wrapper" id="pdf-wrapper">
            <iframe src="main.pdf#view=FitH" title="PDF preview of the thesis"></iframe>
        </div>
    </section>

    <script>
        fetch('README.md')
            .then(function (response) { return response.text(); })
            .then(function (markdown) {
                document.getElementById('readme').innerHTML = marked.parse(markdown);
            })
            .catch(function () {
                document.getElementById('readme').innerHTML = '<p>README could not be loaded.</p>';
            });

        fetch('STATS.md')
            .then(function (response) { return response.text(); })
            .then(function (markdown) {
                document.getElementById('stats').innerHTML = marked.parse(markdown);
            })
            .catch(function () {
                document.getElementById('stats').innerHTML = '<p>Statistics could not be loaded.</p>';
            });
    </script>
</body>

</html>
